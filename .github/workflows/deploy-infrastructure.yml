name: 'Terraform Deploy Infrastructure'

on:
  push:
    branches:
      - main
    paths:
      - 'ci-cd/terraform/**'
  workflow_dispatch:

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    
    # Note: These permissions can be adjusted depending on what else the workflow needs.
    # WIF required id-token: 'write', but Service Account JSON key does not.
    permissions:
      contents: 'read'

    defaults:
      run:
        working-directory: ./ci-cd/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using a Service Account JSON Key stored in GitHub Secrets
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Format check
      - name: Terraform Format
        run: terraform fmt -check

      # Plan deployment
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # Apply deployment automatically on main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

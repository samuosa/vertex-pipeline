name: API Regression Tests

on:
  workflow_run:
    workflows: ["Terraform Deploy Infrastructure"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL of the Cloud Run service to test'
        required: true
        default: 'https://staging-image-generation-service-url.run.app'

jobs:
  test:
    name: Run Pytest API Suite
    runs-on: ubuntu-latest
    # Run tests only if the triggering deployment workflow was successful, or if triggered manually
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run Pytest
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://staging-image-generation-service-url.run.app' }}
        run: |
          pytest tests/api/test_generation.py -v
